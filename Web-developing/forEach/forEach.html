<html>
    <head>
        <script>
            const students = ["Иван", "Мария", "Пётр"]
            students.forEach(i => console.log(i))

            let arr = [1, 2, 3]
            arr.forEach((num, i, array) => array[i]++)
            console.log(arr)

            const words = ["кот", "собака", "мышь"]
            words.forEach(num => console.log(num.length))

            const numbers = [1, 2, 3, 4, 5, 6]
            numbers.forEach((num) => {
                if (num % 2 === 0) {
                    console.log(num)
                }
            })

            const nums = [5, 10, 15]
            let sum = 0
            nums.forEach(num => sum += num)
            console.log(sum)

            const fruits = ["яблоко", "банан", "вишня"]
            let text = ""
            fruits.forEach(num => text += num += " ")
            console.log(text.trim())

            const colors = ["белый", "синий", "красный"]
            colors.forEach((num, id) => console.log(id + ": " + num))
            colors.forEach((num, id) => console.log(`${id}: ${num}`))

            const animals = ["собака", "кот", "собака", "мышь", "собака"]
            let count = 0
            animals.forEach(num => {
                if (num === "собака") {
                    count++
                }
            })
            console.log(count)

            const fruits = ["Киви", "Банан", "Клубника", "Вишня"]
            fruits.forEach((num) => {
                if (num.startsWith("К")) {
                    console.log(num)
                }
            })

            const numbers = [1, 5, 10, 15, 20]
            numbers.forEach((num, id) => {
                if (num === 10) {
                    console.log(`${id}: ${num}`)
                }
            })
        </script>
    </head>

</html>
